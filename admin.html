<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>FERİT Haber - Yönetim Paneli</title>
    <link rel="stylesheet" href="admin-style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Authentication Check -->
    <script>
        // Check if user is logged in
        if (localStorage.getItem('adminLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <!-- Header -->
    <header class="admin-header">
        <div class="container">
            <div class="header-content">
                <h1 class="admin-logo">FERİT <span>Yönetim Paneli</span></h1>
                <div class="header-actions">
                    <a href="index.html" class="btn-secondary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                        Ana Sayfa
                    </a>
                    <button id="logoutBtn" class="btn-secondary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        Çıkış Yap
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="admin-main">
        <div class="container">
            <div class="admin-grid">
                <!-- Form Section -->
                <section class="form-section">
                    <div class="section-header">
                        <h2>Yeni Haber Ekle</h2>
                        <p>Haber bilgilerini doldurun ve görseli yükleyin</p>
                    </div>

                    <form id="newsForm" class="news-form">
                        <!-- Image Upload -->
                        <div class="form-group image-upload-group">
                            <label class="form-label">Haber Görseli</label>
                            <div class="image-upload-area" id="imageUploadArea">
                                <input type="file" id="imageInput" accept="image/*" hidden>
                                <div class="upload-placeholder" id="uploadPlaceholder">
                                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2">
                                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                        <polyline points="21 15 16 10 5 21"></polyline>
                                    </svg>
                                    <p>Görsel yüklemek için tıklayın veya sürükleyin</p>
                                    <span>PNG, JPG veya WEBP (Max. 5MB)</span>
                                </div>
                                <div class="image-preview" id="imagePreview" style="display: none;">
                                    <img id="previewImg" src="" alt="Preview">
                                    <button type="button" class="remove-image" id="removeImage">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2">
                                            <line x1="18" y1="6" x2="6" y2="18"></line>
                                            <line x1="6" y1="6" x2="18" y2="18"></line>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Title -->
                        <div class="form-group">
                            <label for="newsTitle" class="form-label">Haber Başlığı *</label>
                            <input type="text" id="newsTitle" class="form-input"
                                placeholder="Örn: Yapay Zeka ve Medya Etiği" required>
                        </div>

                        <!-- Category -->
                        <div class="form-group">
                            <label for="newsCategory" class="form-label">Kategori *</label>
                            <select id="newsCategory" class="form-select" required>
                                <option value="">Kategori seçin</option>
                                <option value="dünya">Dünya</option>
                                <option value="teknoloji">Teknoloji</option>
                                <option value="kültür">Kültür</option>
                                <option value="spor">Spor</option>
                                <option value="ekonomi">Ekonomi</option>
                            </select>
                        </div>

                        <!-- Summary -->
                        <div class="form-group">
                            <label for="newsSummary" class="form-label">Özet *</label>
                            <textarea id="newsSummary" class="form-textarea" rows="3"
                                placeholder="Haberin kısa özeti (1-2 cümle)" required></textarea>
                        </div>

                        <!-- Content -->
                        <div class="form-group">
                            <label for="newsContent" class="form-label">Haber İçeriği *</label>
                            <textarea id="newsContent" class="form-textarea" rows="8"
                                placeholder="Haberin tam içeriği..." required></textarea>
                        </div>

                        <!-- Author -->
                        <div class="form-group">
                            <label for="newsAuthor" class="form-label">Yazar *</label>
                            <input type="text" id="newsAuthor" class="form-input" value="Ferit Şenoğlu" required>
                        </div>

                        <!-- Read Time -->
                        <div class="form-group">
                            <label for="newsReadTime" class="form-label">Okuma Süresi *</label>
                            <input type="text" id="newsReadTime" class="form-input" placeholder="Örn: 3 dk" required>
                        </div>

                        <!-- Submit Button -->
                        <div class="form-actions">
                            <button type="submit" class="btn-primary">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                                    <polyline points="17 21 17 13 7 13 7 21"></polyline>
                                    <polyline points="7 3 7 8 15 8"></polyline>
                                </svg>
                                Haberi Yayınla
                            </button>
                            <button type="button" class="btn-secondary" id="resetForm">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <polyline points="1 4 1 10 7 10"></polyline>
                                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                                </svg>
                                Formu Temizle
                            </button>
                        </div>
                    </form>
                </section>

                <!-- News List Section -->
                <section class="list-section">
                    <div class="section-header">
                        <h2>Yayınlanmış Haberler</h2>
                        <p id="newsCount">Toplam 0 haber</p>
                    </div>

                    <div class="news-list" id="newsList">
                        <!-- News items will be inserted here -->
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- Success Modal -->
    <div class="modal" id="successModal">
        <div class="modal-overlay"></div>
        <div class="modal-content-small">
            <div class="success-icon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h3>Haber Başarıyla Yayınlandı!</h3>
            <p>Yeni haber ana sayfada görüntülenebilir.</p>
            <button class="btn-primary" id="closeSuccessModal">Tamam</button>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
